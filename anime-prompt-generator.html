<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121f;
    --surface2: #1a1a2e;
    --border: #2a2a4a;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --accent3: #00e5ff;
    --text: #e8e8f5;
    --text2: #9090b0;
    --glow: 0 0 20px rgba(224,64,251,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,77,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,77,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .header {
    text-align: center;
    padding: 3rem 1rem 1rem;
    position: relative;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    position: relative;
  }

  .logo::after {
    content: 'AnimePrompt Studio';
    position: absolute;
    left: 0; right: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: blur(12px);
    opacity: 0.4;
    z-index: -1;
  }

  .subtitle {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem 1.5rem 3rem;
  }

  /* Template Section */
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 1em;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: var(--glow);
  }

  .templates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .template-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .template-card:hover::before { opacity: 0.08; }

  .template-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(224,64,251,0.2), inset 0 0 20px rgba(224,64,251,0.05);
  }

  .template-card.active::before { opacity: 0.12; }

  .template-icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 0.4rem;
  }

  .template-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    position: relative;
  }

  .template-desc {
    font-size: 0.7rem;
    color: var(--text2);
    margin-top: 0.2rem;
    position: relative;
    line-height: 1.4;
  }

  /* Parameters Grid */
  .params-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .param-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .param-label {
    font-size: 0.75rem;
    color: var(--accent3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .param-select, .param-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0.5rem 0.75rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .param-select:focus, .param-input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(124,77,255,0.2);
  }

  .param-select option {
    background: var(--surface2);
  }

  /* Tags */
  .tags-section {
    margin-bottom: 1.5rem;
  }

  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.75rem;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
  }

  .tag:hover {
    border-color: var(--accent2);
    color: var(--text);
  }

  .tag.active {
    background: rgba(124,77,255,0.2);
    border-color: var(--accent2);
    color: var(--accent3);
  }

  /* Generate Button */
  .generate-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }

  .generate-btn:hover::before { left: 120%; }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(224,64,251,0.4); }
  .generate-btn:active { transform: translateY(0); }

  /* Output */
  .output-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .output-tabs {
    display: flex;
    gap: 0.5rem;
  }

  .output-tab {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text2);
    cursor: pointer;
    padding: 0.25rem 0.75rem;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .output-tab.active {
    background: rgba(224,64,251,0.15);
    color: var(--accent);
  }

  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    padding: 0.3rem 0.75rem;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .copy-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .copy-btn.copied { border-color: #00e676; color: #00e676; }

  .output-content {
    padding: 1.25rem;
    min-height: 120px;
  }

  .prompt-text {
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    line-height: 1.8;
    color: var(--text);
    word-break: break-all;
  }

  .prompt-text .tag-highlight {
    color: var(--accent3);
  }

  .prompt-text .quality-highlight {
    color: #ffd740;
  }

  .prompt-text .neg-highlight {
    color: #ff5252;
  }

  .empty-state {
    text-align: center;
    color: var(--text2);
    font-size: 0.85rem;
    padding: 2rem;
  }

  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

  /* Negative prompt */
  .neg-section {
    margin-top: 1.5rem;
  }

  .neg-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 0.75rem 1rem;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }

  .neg-textarea:focus { border-color: #ff5252; }

  /* Random button */
  .random-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    padding: 0.4rem 0.75rem;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 0.5rem;
  }

  .random-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 1.5rem 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
</style>
</head>

function renderCostumeTemplates() {
  const container = document.getElementById('costumeTemplates');
  container.innerHTML = costumePresets.map(t => `
    <div class="tag ${selectedCostumeTemplate === t.id ? 'active' : ''}"
      style="font-size:0.8rem;padding:0.4rem 0.9rem;cursor:pointer"
      onclick="applyCostumeTemplate('${t.id}')">${t.label}</div>
  `).join('');
}

function renderCostumeParams() {
  const grid = document.getElementById('costumeParamsGrid');
  grid.innerHTML = costumeParamConfigs.map(p => `
    <div class="param-group">
      <div class="param-label" style="color:#ff9800">${p.label}</div>
      <input type="text" class="param-input" id="cparam_${p.id}" placeholder="${p.placeholder}">
    </div>
  `).join('');
}

function applyCostumeTemplate(id) {
  selectedCostumeTemplate = id;
  const tmpl = costumePresets.find(t => t.id === id);
  if (!tmpl) return;
  Object.entries(tmpl.values).forEach(([key, val]) => {
    const el = document.getElementById(`cparam_${key}`);
    if (el) el.value = val;
  });
  renderCostumeTemplates();
}


let selectedTags = new Set();
let currentTab = 'positive';
let lastPositivePrompt = '';
let lastNegativePrompt = '';

// Render Templates
function renderTemplates() {
  const grid = document.getElementById('templateGrid');
  grid.innerHTML = templates.map(t => `
    <div class="template-card ${selectedTemplate?.id === t.id ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
      <span class="template-icon">${t.icon}</span>
      <div class="template-name">${t.name}</div>
      <div class="template-desc">${t.desc}</div>
    </div>
  `).join('');
}

// Render Params
function renderParams() {
  const grid = document.getElementById('paramsGrid');
  grid.innerHTML = paramConfigs.map(p => `
    <div class="param-group">
      <div class="param-label">${p.label}</div>
      <select class="param-select" id="param_${p.id}">
        ${p.options.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
      </select>
    </div>
  `).join('');
}

// Render Tags
function renderTagGroups() {
  const container = document.getElementById('tagGroups');
  container.innerHTML = tagGroups.map(group => `
    <div style="margin-bottom:0.75rem">
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:0.4rem">${group.label}</div>
      <div class="tags-container">
        ${group.tags.map(tag => `
          <div class="tag ${selectedTags.has(tag) ? 'active' : ''}" onclick="toggleTag('${tag}')">${tag}</div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectTemplate(id) {
  selectedTemplate = templates.find(t => t.id === id);
  renderTemplates();
}

function toggleTag(tag) {
  if (selectedTags.has(tag)) selectedTags.delete(tag);
  else selectedTags.add(tag);
  renderTagGroups();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  updateOutput();
}

function generatePrompt() {
  if (!selectedTemplate) {
    alert('テンプレートを選択してください');
    return;
  }

  const parts = [selectedTemplate.base];

  // Params
  paramConfigs.forEach(p => {
    const el = document.getElementById(`param_${p.id}`);
    if (el && el.value) parts.push(el.value);
  });

  // Costume params
  costumeParamConfigs.forEach(p => {
    const el = document.getElementById(`cparam_${p.id}`);
    if (el && el.value.trim()) parts.push(el.value.trim());
  });

  // Style
  parts.push(selectedTemplate.style);

  // Extra tags
  if (selectedTags.size > 0) parts.push([...selectedTags].join(', '));

  // Custom
  const custom = document.getElementById('customInput').value.trim();
  if (custom) parts.push(custom);

  lastPositivePrompt = parts.filter(Boolean).join(', ');
  lastNegativePrompt = selectedTemplate.neg;

  document.getElementById('negPromptArea').value = lastNegativePrompt;
  updateOutput();
}

function updateOutput() {
  const content = document.getElementById('outputContent');
  const text = currentTab === 'positive' ? lastPositivePrompt : lastNegativePrompt;

  if (!text) {
    content.innerHTML = `<div class="empty-state"><span class="emoji">✨</span>テンプレートを選択してプロンプトを生成してください</div>`;
    return;
  }

  // Highlight different parts
  let highlighted = text
    .split(', ')
    .map(tag => {
      const t = tag.trim();
      if (/(masterpiece|best quality|ultra detailed|highly detailed|8k|resolution)/i.test(t))
        return `<span class="quality-highlight">${t}</span>`;
      if (/(bad|worst|lowres|blur|nsfw|cropped)/i.test(t))
        return `<span class="neg-highlight">${t}</span>`;
      return `<span class="tag-highlight">${t}</span>`;
    })
    .join('<span style="color:var(--text2)">, </span>');

  content.innerHTML = `<div class="prompt-text">${highlighted}</div>`;
}

function copyPrompt() {
  const text = currentTab === 'positive' ? lastPositivePrompt : lastNegativePrompt;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ コピー完了';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function randomizeAll() {
  // Random template
  selectedTemplate = templates[Math.floor(Math.random() * templates.length)];
  renderTemplates();

  // Random params
  paramConfigs.forEach(p => {
    const el = document.getElementById(`param_${p.id}`);
    if (el) {
      el.selectedIndex = Math.floor(Math.random() * el.options.length);
    }
  });

  // Random costume template
  const randomCostume = costumePresets[Math.floor(Math.random() * costumePresets.length)];
  applyCostumeTemplate(randomCostume.id);

  // Random tags
  selectedTags.clear();
  tagGroups.forEach(group => {
    group.tags.forEach(tag => {
      if (Math.random() > 0.6) selectedTags.add(tag);
    });
  });
  renderTagGroups();

  generatePrompt();
}

renderTemplates();
renderParams();
renderCostumeTemplates();
renderCostumeParams();
renderTagGroups();
